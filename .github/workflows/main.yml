name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests del backend
        run: npm run test --workspace=apps/backend

      - name: Desplegar a Render
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Error: RENDER_DEPLOY_HOOK no está configurado."
            exit 1
          fi
          echo "Tests aprobados. Disparando webhook de Render..."
          curl -X POST -d "" "$RENDER_DEPLOY_HOOK"
